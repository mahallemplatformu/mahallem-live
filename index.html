<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Mahallem İstatistikleri</title>
</head>
<body>

<div class="container">
    <div id="requests">0</div>
    <div id="completedHelp">0</div>
    <div id="sharedItems">0</div>
    <div id="lostPets">0</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDs4_rVKTZ88lA8KN11Hp-U0Wwsic6vSiw",
        authDomain: "mahallem-5b774.firebaseapp.com",
        projectId: "mahallem-5b774",
        storageBucket: "mahallem-5b774.firebasestorage.app",
        messagingSenderId: "209961116023",
        appId: "1:209961116023:web:f2e96b867827502e3e4172"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // SENİN VERİTABANI YOLUN: istatistikler -> küresel
    const statsRef = doc(db, "istatistikler", "küresel");

    onSnapshot(statsRef, (docSnap) => {
        if (docSnap.exists()) {
            const data = docSnap.data();
            
            // Veritabanındaki alan isimleriyle birebir eşleşme
            document.getElementById("requests").innerText = data["Oluşturulan Talepler"] || 0;
            document.getElementById("completedHelp").innerText = data["Tamamlanan Yardımlar"] || 0;
            document.getElementById("sharedItems").innerText = data["eşya paylaşımı"] || 0;
            document.getElementById("lostPets").innerText = data["Kayıplar ve Sahiplendirme Başvuruları"] || 0;
            
            console.log("Veri başarıyla güncellendi:", data);
        } else {
            console.log("Belge bulunamadı, adres yolunu kontrol et!");
        }
    }, (error) => {
        console.error("Firebase Hatası: ", error);
    });
</script>
</body>
</html>
