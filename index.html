<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDs4_rVKTZ88lA8KN11Hp-U0Wwsic6vSiw",
  authDomain: "mahallem-5b774.firebaseapp.com",
  projectId: "mahallem-5b774",
  storageBucket: "mahallem-5b774.firebasestorage.app",
  messagingSenderId: "209961116023",
  appId: "1:209961116023:web:f2e96b867827502e3e4172"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function animateValue(id, end){
    const element = document.getElementById(id);
    if (!element) return;
    element.innerText = end; // Animasyonu basitleştirdik, direkt değeri yazsın
}

// Koleksiyon yolu: "istatistikler" -> "küresel"
const statsRef = doc(db, "istatistikler", "küresel");

onSnapshot(statsRef, (docSnap) => {
    if (docSnap.exists()) {
        const data = docSnap.data();
        animateValue("requests", data["Oluşturulan Talepler"] || 0);
        animateValue("completedHelp", data["Tamamlanan Yardımlar"] || 0);
        animateValue("sharedItems", data["Eşya Paylaşımı"] || 0);
        animateValue("lostPets", data["Kayıplar ve Sahiplendirme Başvuruları"] || 0);
    }
});
</script>
