<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Mahallem İstatistikleri</title>
    <style>
        .container { display: flex; gap: 20px; justify-content: center; }
        .card { padding: 30px; border: 1px solid #ccc; text-align: center; }
        .number { font-size: 40px; font-weight: bold; color: green; }
    </style>
</head>
<body>
<div class="container">
    <div class="card"><div class="number" id="requests">0</div><div>Oluşturulan Talepler</div></div>
    <div class="card"><div class="number" id="completedHelp">0</div><div>Tamamlanan Yardımlar</div></div>
    <div class="card"><div class="number" id="sharedItems">0</div><div>Eşya Paylaşımı</div></div>
    <div class="card"><div class="number" id="lostPets">0</div><div>Kayıplar ve Sahiplendirme Başvuruları</div></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDs4_rVKTZ88lA8KN11Hp-U0Wwsic6vSiw",
        authDomain: "mahallem-5b774.firebaseapp.com",
        projectId: "mahallem-5b774",
        storageBucket: "mahallem-5b774.firebasestorage.app",
        messagingSenderId: "209961116023",
        appId: "1:209961116023:web:f2e96b867827502e3e4172"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const statsRef = doc(db, "statistics", "global");

    // SADECE sayfa tamamen hazır olduğunda veriyi dinle
    window.onload = () => {
        onSnapshot(statsRef, (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                
                // Güvenli yazdırma
                const ids = ["requests", "completedHelp", "sharedItems", "lostPets"];
                const keys = ["Oluşturulan Talepler", "Tamamlanan Yardımlar", "Eşya Paylaşımı", "Kayıplar ve Sahiplendirme Başvuruları"];
                
                ids.forEach((id, index) => {
                    const el = document.getElementById(id);
                    if (el) {
                        el.innerText = data[keys[index]] || 0;
                    }
                });
            }
        });
    };
</script>
</body>
</html>
